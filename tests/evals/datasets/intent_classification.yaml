# Intent Classification Eval Dataset
# 35 casi: 5 per ognuna delle 7 classi intent
#
# split: eval  → casi blindati, MAI usare per prompt engineering
# split: dev   → usabili per migliorare i prompt, non contano nelle metriche CI
#
# Target: accuracy >= 85% sui casi eval (21 casi)
# Metriche: accuracy aggregata + precision/recall per classe

# ─── FACTUAL ───────────────────────────────────────────────────────────────
- id: ic_f_001
  query: "Cosa sta succedendo in Ucraina negli ultimi 7 giorni?"
  expected_intent: "factual"
  split: eval
  notes: "Recente, entità geografica chiara, frame temporale esplicito"

- id: ic_f_002
  query: "Quali sono gli ultimi sviluppi sul conflitto in Sudan?"
  expected_intent: "factual"
  split: eval

- id: ic_f_003
