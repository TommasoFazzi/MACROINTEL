schema: spec-driven

context: |
  ## Project: INTELLIGENCE_ITA
  End-to-end geopolitical intelligence platform. Ingests 33+ RSS feeds, processes with NLP
  (spaCy + sentence-transformers), stores in PostgreSQL+pgvector, generates intelligence reports
  via Gemini LLM with RAG, and serves a Next.js dashboard with force-directed narrative graph.

  ## Tech Stack
  - Backend: Python 3.12, FastAPI, Pydantic v2, asyncio
  - Database: PostgreSQL 16 + pgvector + PostGIS
  - NLP: spaCy (xx_ent_wiki_sm), sentence-transformers (paraphrase-multilingual-MiniLM-L12-v2), HDBSCAN
  - LLM: Google Gemini API (gemini-2.0-flash / gemini-2.5-flash — see model policy below)
  - Frontend: Next.js 16 App Router, React 19, TypeScript 5, Tailwind CSS 4, SWR, Mapbox GL
  - Infra: Docker Compose on Hetzner CAX31 (ARM64), Grafana + Loki monitoring

  ## Directory Layout
  - src/ingestion/     — async RSS parsing, full-text extraction, deduplication
  - src/nlp/           — NLP pipeline, narrative_processor.py (HDBSCAN engine), relevance_filter.py
  - src/llm/           — report_generator.py (~2700 lines), oracle_orchestrator.py, oracle_engine.py, query_router.py, tools/
  - src/macro/         — convergence detection, SC signals, regime persistence (Strategic Intelligence Layer)
  - src/storage/       — database.py (~2445 lines), all PostgreSQL/pgvector operations
  - src/api/           — FastAPI routers: dashboard, reports, stories, map, oracle, insights, waitlist
  - src/knowledge/     — ontology_manager.py (asset_theory_library.yaml + macro_convergences.yaml + sc_sector_map.yaml)
  - src/integrations/  — openbb_service.py (~1026 lines, 36 MACRO_INDICATORS)
  - scripts/           — daily_pipeline.py (10-step orchestrator), generate_report.py, process_narratives.py, etc.
  - web-platform/      — Next.js frontend (separate npm project)
  - config/            — feeds.yaml, top_50_tickers.yaml, entity_blocklist.yaml, asset_theory_library.yaml
  - migrations/        — numbered SQL migration files (035 applied in prod as of 2026-04-14)

  ## CRITICAL: Gemini Model Policy
  - NLP layer (narrative_processor.py, relevance_filter.py) → gemini-2.0-flash ONLY
  - LLM/report layer (report_generator.py, oracle_orchestrator.py, query_router.py, oracle_engine.py) → gemini-2.5-flash ONLY
  - NEVER cross-assign models between layers — it degrades quality or wastes cost
  - ALWAYS specify request_options={"timeout": N}: 30s for 2.0-flash, 60s for 2.5-flash
  - Missing timeout causes ~900s hang on network issues (transport='rest')

  ## CRITICAL: Async Pattern
  - asyncio.run() called ONCE in pipeline.run() — never nest event loops
  - Ingestion: TCPConnector(limit=20, limit_per_host=3), Semaphore(10) for extraction
  - Scrapling StealthyFetcher: Semaphore(2) max (Chromium, OOM risk on CI)
  - Per-article timeout: asyncio.wait_for(..., timeout=30) in extraction

  ## CRITICAL: LLM Prompt f-strings
  - report_generator.py prompts use f-strings — always pre-compute variables BEFORE the f-string
  - Variables like {narrative_section} must NOT be double-braced {{}} — they become literal text
  - Pattern: build `narrative_section = "..."` then use f"{narrative_section}" in the prompt

  ## Key Architectural Patterns
  - RAG pipeline: vector search top-20 → cross-encoder reranking → top-10 (~15-20% precision gain)
  - Oracle 2.0: singleton via get_oracle_orchestrator_singleton() — holds 400MB model, never re-init per request
  - Narrative Engine: HDBSCAN micro-clustering → embedding matching → LLM summary evolution → Jaccard graph (threshold 0.05)
  - Chain-of-Verification (CoVe): when structured data and RAG disagree on quantitative KPIs, annotate both
  - Time-weighted decay (Oracle): score * exp(-k * days), dynamic k per intent, min floor 0.15
  - Trade signal pipeline: macro-first → context condensation → Pydantic validation (BULLISH/BEARISH/NEUTRAL/WATCHLIST)

  ## Database Conventions
  - Migrations: manual via psql, named NNN_description.sql (sequential, e.g. 036_name.sql next)
  - Primary views for API/reports: v_active_storylines, v_storyline_graph (NOT raw tables)
  - SQLTool: ALWAYS use v_sanctions_public (PII-sanitized). NEVER sanctions_registry directly
  - entity_idf and mv_entity_storyline_bridge are materialized views — REFRESH after bulk updates
  - oracle_query_log: if table missing, log_oracle_query() silently no-ops (non-critical)

  ## Context Files
  Each src/ module directory contains a context.md describing its purpose and public interface.
  After EVERY task that modifies code in a module, update its context.md to match the new state.
  Never leave a context.md describing code that no longer exists.

  ## Testing
  - pytest markers: unit, integration, e2e, slow
  - CI: needs GEMINI_API_KEY="ci-fake-key-for-unit-tests" + --ignore=tests/test_sprint2_full.py
  - Async tests: pytest-asyncio + AsyncMock
  - Do NOT mock the database in integration tests — use real DB or skip with @pytest.mark.integration

rules:
  proposal:
    - Keep proposals under 400 words
    - Always include a "Non-goals" section
    - Always identify the primary module(s) affected (e.g. src/llm/, src/nlp/, web-platform/)
    - Always state whether a new SQL migration is required (yes/no)
    - Always state which Gemini model tier is involved (NLP=2.0-flash, LLM=2.5-flash, none)
    - Reference the Strategic Intelligence Layer phase if relevant (Phase 3-6)

  specs:
    - Include Pydantic v2 models or SQL schema for any new data structures
    - Describe pre/post behavior for every modified public function
    - Document any new environment variables required
    - Flag any change to ALLOWED_TABLES in SQLTool or ReferenceTool

  tasks:
    - Each task must name the exact file path to modify (relative to repo root)
    - Each task must include a verification step (pytest command, SQL query, or manual check)
    - No task should exceed ~2 hours of estimated work — break larger tasks down
    - The final task of every change must include: update all affected context.md files
    - If a migration is required, it must be its own dedicated task (create + document separately)
    - If a new env var is introduced, add it to .env.example as a dedicated task
