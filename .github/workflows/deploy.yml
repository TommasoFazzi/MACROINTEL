name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download xx_ent_wiki_sm

      - name: Run tests
        env:
          GEMINI_API_KEY: "ci-fake-key-for-unit-tests"
        run: pytest tests/ -m "not slow" --ignore=tests/test_sprint2_full.py --tb=short -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /opt/intelligence-ita/repo
            git pull origin main
            sudo docker compose -p app --env-file .env.production build backend frontend
            sudo docker compose -p app --env-file .env.production up -d --no-deps backend frontend
            sudo docker compose -p app --env-file .env.production exec -T nginx nginx -s reload
            # Rimuove container fermati (orfani da docker compose run manuali)
            sudo docker container prune -f
            echo "Deploy completed at $(date)"
